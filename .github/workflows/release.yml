name: Release

on:
  push:
    branches: [main]

permissions:
    id-token: write  # Required for OIDC
    contents: write  # Required for creating releases and tags

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          TAG="v${CURRENT_VERSION}"

          echo "version=$CURRENT_VERSION"
          echo "tag=$TAG"

          # Check if a release already exists for this version
          if git tag -l | grep -qx "$TAG"; then
            echo "Tag $TAG already exists — skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist — proceeding with release"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: gh-doccy-linux-amd64
            runner: ubuntu-latest
          - target: bun-linux-arm64
            artifact: gh-doccy-linux-arm64
            runner: ubuntu-latest
          - target: bun-darwin-x64
            artifact: gh-doccy-darwin-amd64
            runner: macos-latest
          - target: bun-darwin-arm64
            artifact: gh-doccy-darwin-arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --target=${{ matrix.target }} \
            --sourcemap \
            --format=esm \
            --bytecode \
            --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  npm-publish:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for npm provenance
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Publish to npm
        run: npm publish --provenance

  release:
    needs: [check-version, build, npm-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/gh-doccy-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            chmod +x "release/$name"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: release/*
